services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-md_ops}
      POSTGRES_USER: ${POSTGRES_USER:-md_ops}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-md_ops_dev_password}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-md_ops} -d ${POSTGRES_DB:-md_ops}"]
      interval: 10s
      timeout: 5s
      retries: 8

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-md_ops}:${POSTGRES_PASSWORD:-md_ops_dev_password}@postgres:5432/${POSTGRES_DB:-md_ops}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/data/uploads
    ports:
      - "${API_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 8

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_APP_URL:-http://localhost}/api
      INTERNAL_API_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    profiles: ["prod"]
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost}
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - api

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
