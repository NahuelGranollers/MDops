name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile=false
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
      - name: Generate build ID
        id: build-id
        run: echo "build-id=$(date +%s)" >> $GITHUB_OUTPUT
      - run: pnpm --filter @md-ops/web build
        env:
          NEXT_PUBLIC_API_URL: https://m-dops-api.vercel.app/api
          NEXT_PUBLIC_BASE_PATH: /MDops
          STATIC_EXPORT: true
          NEXT_PUBLIC_BUILD_ID: ${{ steps.build-id.outputs.build-id }}
      - name: Generate build-id.json
        run: echo '{"id":"${{ steps.build-id.outputs.build-id }}"}' > apps/web/out/build-id.json
      - name: Remove RSC payload files (iPhone serves .txt instead of .html)
        run: find apps/web/out -type f -name "index.txt" -delete
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out
      - id: deployment
        uses: actions/deploy-pages@v4
