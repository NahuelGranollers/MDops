name: Deploy Next.js site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build with Next.js
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_API_URL: "https://m-dops-api.vercel.app/api"
          NEXT_PUBLIC_BASE_PATH: "/MDops"
        # Forzamos a pnpm a ejecutar el build directamente sobre el filtro
        run: pnpm --filter @md-ops/web build

      # Movido aquí abajo para que no interfiera negativamente con el proceso de compilación del monorrepo
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Confirmamos la ruta relativa exacta hacia la salida estática del frontend
          path: apps/web/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
